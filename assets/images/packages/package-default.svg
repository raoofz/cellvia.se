<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6b4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#104d33;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Package box -->
  <rect x="20" y="35" width="80" height="60" rx="4" fill="url(#grad1)" opacity="0.9"/>
  <!-- Box highlight -->
  <rect x="20" y="35" width="80" height="12" rx="4" fill="#ffffff" opacity="0.2"/>
  <!-- Tape across package -->
  <rect x="20" y="58" width="80" height="4" fill="#ffffff" opacity="0.4"/>
  <!-- Package label area -->
  <rect x="32" y="45" width="56" height="28" rx="2" fill="#ffffff" opacity="0.15"/>
  <!-- Decorative lines on label -->
  <line x1="38" y1="52" x2="82" y2="52" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="38" y1="58" x2="82" y2="58" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <line x1="38" y1="64" x2="72" y2="64" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
</svg>